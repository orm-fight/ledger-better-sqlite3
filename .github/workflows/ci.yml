name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Generate SBOM (CycloneDX, with transitive dependencies)
        if: always()
        run: npm sbom --sbom-format=cyclonedx > sbom.cdx.json

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
          if-no-files-found: error

      - name: Submit dependency snapshot to GitHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jq -n \
            --arg sha "$GITHUB_SHA" \
            --arg ref "$GITHUB_REF" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg scanned "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --slurpfile sbom sbom.cdx.json '{
              version: 0,
              sha: $sha,
              ref: $ref,
              job: { correlator: "ci-sbom", id: $run_id },
              detector: {
                name: "npm-cyclonedx-sbom",
                version: "1.0.0",
                url: "https://docs.npmjs.com/cli/v10/commands/npm-sbom"
              },
              scanned: $scanned,
              manifests: {
                "package-lock.json": {
                  name: "package-lock.json",
                  file: { source_location: "package-lock.json" },
                  resolved: ($sbom[0].components // [] | map(select(.purl) | { (.purl): { package_url: .purl } }) | add // {})
                }
              }
            }' > snapshot.json
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$GITHUB_REPOSITORY/dependency-graph/snapshots" \
            --input snapshot.json
